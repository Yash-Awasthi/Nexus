# Railway deployment configuration for NEXUS
#
# This file configures the nexus-api service.
# nexus-ui and nexus-worker must have their Dockerfile paths set
# manually in Railway UI → service → Settings → Build → Dockerfile path:
#   nexus-ui:     apps/ui/Dockerfile
#   nexus-worker: apps/worker/Dockerfile
#
# Required env vars (set in each service's Variables tab):
#   DATABASE_URL   — auto-set by Railway PostgreSQL plugin
#   REDIS_URL      — auto-set by Railway Redis plugin
#   JWT_SECRET     — generate with: openssl rand -hex 32
#   HMAC_KEY       — generate with: openssl rand -hex 32
#   SCRYPT_SECRET  — generate with: openssl rand -hex 32
#   NODE_ENV=production
#
# nexus-ui also needs:
#   NEXUS_API_URL  — public URL of nexus-api service (from Railway)
#
# Optional (enables AI providers):
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GROQ_API_KEY, GEMINI_API_KEY

[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
