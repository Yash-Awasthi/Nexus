# SPDX-License-Identifier: Apache-2.0
# Render.com deployment blueprint — Nexus Unified
# Deploy: https://render.com/deploy
# Docs: https://render.com/docs/blueprint-spec
#
# Services:
#   nexus-api    — Fastify backend  (apps/api)
#   nexus-ui     — React SPA        (apps/ui, served by nginx)
#   nexus-worker — background jobs  (apps/worker)
#   nexus-ingest — Python ingest    (services/ingest)
# Infrastructure:
#   nexus-postgres — Postgres 16
#   nexus-redis    — Redis

services:
  # ── Nexus API ────────────────────────────────────────────────────────────────
  - type: web
    name: nexus-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexus-redis
          type: redis
          property: connectionString
      - key: NEXUS_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://nexus-ui.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: OPENROUTER_API_KEY
        sync: false   # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  # ── Nexus UI ──────────────────────────────────────────────────────────────────
  # React Router 7 SPA (no SSR). Built with vite, served by nginx.
  # nginx proxies /api/* → nexus-api so the frontend has one origin.
  - type: web
    name: nexus-ui
    runtime: docker
    dockerfilePath: apps/ui/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NEXUS_API_INTERNAL_URL
        fromService:
          name: nexus-api
          type: web
          property: hostURL
    healthCheckPath: /health
    autoDeploy: true

  # ── Nexus Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: nexus-worker
    runtime: docker
    dockerfilePath: apps/worker/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexus-redis
          type: redis
          property: connectionString
      - key: NEXUS_API_KEY
        fromService:
          name: nexus-api
          type: web
          envVarKey: NEXUS_API_KEY
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    autoDeploy: true

  # ── Python Ingest Service ────────────────────────────────────────────────────
  - type: worker
    name: nexus-ingest
    runtime: docker
    dockerfilePath: services/ingest/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexus-redis
          type: redis
          property: connectionString
      - key: NEXUS_API_KEY
        fromService:
          name: nexus-api
          type: web
          envVarKey: NEXUS_API_KEY
      - key: LOG_LEVEL
        value: info
    autoDeploy: true

databases:
  - name: nexus-postgres
    plan: starter
    databaseName: nexus
    user: nexus
    postgresMajorVersion: "16"

  - name: nexus-redis
    plan: starter
    ipAllowList: []
