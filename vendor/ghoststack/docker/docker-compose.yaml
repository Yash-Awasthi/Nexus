version: "3.8"

services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ghoststack-core-runner
    environment:
      - NODE_ENV=production
      - GHOSTSTACK_API_PORT=8080
      - GHOSTSTACK_DATA_DIR=/app/data-runtime
      - GHOSTSTACK_OFFLINE_MODE=true
    volumes:
      - ghoststack-data:/app/data-runtime
      - ghoststack-logs:/app/logs
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ghoststack-data:
    driver: local
  ghoststack-logs:
    driver: local
