# Phase 2 optional stack — document archive (paperless-ngx)
# Not required for GhostStack orchestrator core. Start alongside core when needed:
#   docker compose -f docker/docker-compose.yaml -f docker/docker-compose.optional.yaml up -d

version: "3.8"

services:
  paperless-db:
    image: docker.io/library/postgres:16-alpine
    container_name: ghoststack-paperless-db
    restart: unless-stopped
    volumes:
      - paperless-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless

  paperless-redis:
    image: docker.io/library/redis:7-alpine
    container_name: ghoststack-paperless-redis
    restart: unless-stopped
    volumes:
      - paperless-redis:/data

  paperless-web:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: ghoststack-paperless
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
    ports:
      - "8001:8000"
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
      - paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless
      PAPERLESS_DBNAME: paperless
      USERMAP_UID: 1000
      USERMAP_GID: 1000

volumes:
  paperless-db:
  paperless-redis:
  paperless-data:
  paperless-media:
  paperless-export:
  paperless-consume:
