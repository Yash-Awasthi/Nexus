# Default values for the NEXUS Helm chart.

global:
  image:
    registry: ghcr.io/yash-awasthi
    pullPolicy: IfNotPresent
  env:
    DATABASE_URL: ""         # Required: set via --set or sealed secret
    REDIS_URL: "redis://nexus-redis:6379"
    NEXUS_API_KEY: ""        # Required
    NEXUS_AUDIT_KEY: ""      # Required
    GROQ_API_KEY: ""         # Required
    LOG_LEVEL: "info"

api:
  enabled: true
  image:
    repository: nexus-api
    tag: "latest"
  replicaCount: 2
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

worker:
  enabled: true
  image:
    repository: nexus-worker
    tag: "latest"
  replicaCount: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

ingest:
  enabled: true
  image:
    repository: nexus-ingest
    tag: "latest"
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    NEXUS_INGEST_API_KEY: ""   # Required

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: nexus.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nexus-tls
      hosts:
        - nexus.example.com

postgresql:
  enabled: true    # Set false to use external DB
  auth:
    postgresPassword: "changeme"
    database: nexus

redis:
  enabled: true    # Set false to use external Redis
  architecture: standalone
  auth:
    enabled: false

serviceAccount:
  create: true
  name: "nexus"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

networkPolicy:
  enabled: true
