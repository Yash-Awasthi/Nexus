# OpenTelemetry Collector configuration for Nexus local dev.
# Used by docker compose --profile observability.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  # Log traces to stdout in dev
  debug:
    verbosity: detailed
  # Prometheus metrics scrape endpoint
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: nexus

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
