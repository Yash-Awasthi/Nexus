# SPDX-License-Identifier: Apache-2.0
# Service accounts for Nexus API and Worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-api
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: api
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-worker
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: worker
automountServiceAccountToken: false
---
# RBAC: worker needs to read ConfigMaps for feature flags
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexus-worker
  namespace: nexus
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-worker
  namespace: nexus
subjects:
  - kind: ServiceAccount
    name: nexus-worker
    namespace: nexus
roleRef:
  kind: Role
  name: nexus-worker
  apiGroup: rbac.authorization.k8s.io
