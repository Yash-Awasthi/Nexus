# Nexus — HTTPS Ingress (nginx + cert-manager Let's Encrypt)
#
# Prerequisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   kubectl apply -f infra/k8s/cluster-issuer.yaml
#
# After apply:
#   kubectl get certificate -n nexus          # watch READY=True
#   kubectl get ingress -n nexus              # verify ADDRESS is assigned
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-api
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: ingress
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # cert-manager automatic TLS via Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Force HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # HSTS (1 year, include subdomains, preload)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
spec:
  tls:
    - hosts:
        - api.nexus.yashawasthi.dev
      secretName: nexus-api-tls
  rules:
    - host: api.nexus.yashawasthi.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-api
                port:
                  number: 3000
---
# Let's Encrypt ClusterIssuer (apply once per cluster)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: yashawasthi12032006@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
