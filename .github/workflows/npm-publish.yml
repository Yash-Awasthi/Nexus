# SPDX-License-Identifier: Apache-2.0
# npm publish — manual only. Requires NPM_TOKEN secret.
#
# What this publishes:
#   @nexus/cli      — nexus CLI (apps/cli)
#   @nexus/billing  — Stripe billing helpers (packages/billing)
#   @nexus/tier-gate — tier gating middleware (packages/tier-gate)
#   @nexus/context-pruner — context pruning lib (packages/context-pruner)
#   @nexus/llm-drivers    — LLM provider drivers (packages/llm-drivers)
#   @nexus/gateway-log    — gateway request log (packages/gateway-log)
#
# Secrets required (set in repo settings → Secrets → Actions):
#   NPM_TOKEN — npm automation token (read+write, no MFA)
#
# Trigger: workflow_dispatch only (prevents spurious fires on package.json edits)
name: npm Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (leave blank for all changed)"
        required: false

concurrency:
  group: npm-publish
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build --filter="./packages/*" --filter="./apps/cli"

      - name: Run tests
        run: pnpm test --filter="./packages/*"

      - name: Publish changed packages (Changesets)
        run: pnpm changeset publish --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Tag published versions
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          pnpm changeset tag
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Post-publish notification
    runs-on: ubuntu-latest
    needs: publish
    if: success()
    steps:
      - name: Summary
        run: |
          echo "## Packages published successfully" >> $GITHUB_STEP_SUMMARY
          echo "Published at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "Registry: https://registry.npmjs.org" >> $GITHUB_STEP_SUMMARY
