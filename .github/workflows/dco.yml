# SPDX-License-Identifier: Apache-2.0
name: DCO Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO
        uses: probot/actions-dco@v1
        with:
          require-sign-off: true
