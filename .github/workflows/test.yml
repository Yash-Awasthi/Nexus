# SPDX-License-Identifier: Apache-2.0
name: Test

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      # Use --no-frozen-lockfile so the lockfile can auto-heal when workspace
      # package.json files diverge from the checked-in lock (e.g. after manual
      # package.json edits). Frozen mode is enforced in the build matrix.
      - run: pnpm install --no-frozen-lockfile

      # Build all packages so cross-package type imports resolve at test time.
      - run: pnpm build

      # Run vitest from the workspace root so the root vitest.config.ts
      # controls the include globs (packages/*/tests/**) rather than having
      # each per-package script inherit the root config from a subdirectory,
      # which would cause "No test files found" failures.
      - name: Run unit tests with coverage
        run: pnpm exec vitest run --coverage
        env:
          # Schema tests are type-only (no live queries), but the db client
          # throws at import time without DATABASE_URL.  A placeholder URL
          # satisfies the guard; no real connection is made.
          DATABASE_URL: postgresql://test:test@localhost/nexus_ci

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          # Coverage is written to the workspace root coverage/ dir when vitest
          # is run from root (not per-package coverage dirs).
          files: coverage/lcov.info,packages/*/coverage/lcov.info
          fail_ci_if_error: false

  e2e:
    name: E2E — signal pipeline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - name: Enable pgvector extension
        run: PGPASSWORD=nexus psql -h localhost -U nexus -d nexus_e2e -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Apply database schema
        working-directory: packages/db
        run: pnpm db:push --force
        env:
          DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus_e2e
      - name: Run E2E signal pipeline tests
        run: pnpm --filter @nexus/worker test -- --reporter=verbose tests/e2e/
        env:
          DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus_e2e

  python:
    name: Python tests (nexus-ingest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - working-directory: services/ingest
        run: |
          pip install -e ".[dev]"
          pytest --tb=short -q
