# SPDX-License-Identifier: Apache-2.0
name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nexus

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build matrix ─────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            image_suffix: api
          - service: worker
            dockerfile: apps/worker/Dockerfile
            image_suffix: worker
          - service: ingest
            dockerfile: services/ingest/Dockerfile
            image_suffix: ingest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Nexus ${{ matrix.service }}
            org.opencontainers.image.description=Nexus autonomous orchestration — ${{ matrix.service }} service
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

  # ── Compose smoke test ────────────────────────────────────────────────────────
  smoke:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose up -d postgres redis
          docker compose up -d --build api worker ingest
          sleep 20

      - name: API health check
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf http://localhost:3000/health && echo "ok" || echo "fail")
            [ "$STATUS" = "ok" ] && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          curl -sf http://localhost:3000/health/ready

      - name: Ingest health check
        run: curl -sf http://localhost:8000/health

      - name: Print logs on failure
        if: failure()
        run: docker compose logs
