name: Bug Report
description: Report a reproducible bug
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to file a bug report. Please fill this out as completely as possible."
  - type: input
    id: version
    attributes:
      label: NEXUS version / commit SHA
      placeholder: "e.g. main@a1b2c3d or v0.3.0"
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@nexus/runtime"
        - "@nexus/council"
        - "@nexus/governance"
        - "@nexus/db"
        - "@nexus/shared"
        - "@nexus/api"
        - "@nexus/worker"
        - "@nexus/web"
        - "@nexus/cli"
        - "nexus-ingest (Python)"
        - "adapter"
        - "infra / docker"
        - "other"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest commit on `main`
          required: false
