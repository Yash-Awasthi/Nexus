server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint for Render / Docker healthchecks
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Proxy /api/* → Nexus API backend
    # NEXUS_API_INTERNAL_URL is set at deploy time; default to localhost:3001 for local Docker usage
    location /api/ {
        proxy_pass http://${NEXUS_API_INTERNAL_URL:-localhost:3001}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        # SSE support — disable buffering for /api/*/stream endpoints
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — serve index.html for all unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
