# GhostStack Federation Services
# Boots Floci (local AWS emulator) and optional supporting services.
# Used by `gs start:federation` and FederationSupervisor.
#
# Usage:
#   docker compose -f docker/docker-compose.federation.yaml up -d floci
#   docker compose -f docker/docker-compose.federation.yaml down --remove-orphans

services:
  # ------------------------------------------------------------------
  # Floci — local AWS emulator (S3, DynamoDB, SQS, Lambda, etc.)
  # Matches the orchestration/floci-adapter.ts action surface.
  # ------------------------------------------------------------------
  floci:
    # Floci = local AWS emulator (S3/SQS/DynamoDB/Lambda)
    # Official image: check https://github.com/hectorvent/floci/pkgs/container/floci
    # or build locally from apps/floci
    image: ghcr.io/hectorvent/floci:latest
    container_name: ghoststack-floci
    ports:
      - "4566:4566"
    environment:
      - FLOCI_QUARKUS_HTTP_PORT=4566
      - FLOCI_DB_BACKEND=in-memory
      - FLOCI_LAMBDA_ZIP_REUSE=true
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4566/health 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    volumes:
      - ghoststack-floci-data:/data/floci
    restart: unless-stopped
    networks:
      - ghoststack-net

  # ------------------------------------------------------------------
  # (Optional) GhostStack runtime as a container
  # Uncomment to run the orchestrator API inside Docker instead of host.
  # ------------------------------------------------------------------
  # orchestrator:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: ghoststack-orchestrator
  #   ports:
  #     - "${GHOSTSTACK_API_PORT:-3000}:3000"
  #   environment:
  #     - GHOSTSTACK_FLOCI_URL=http://floci:4566
  #     - GHOSTSTACK_OFFLINE_MODE=false
  #   depends_on:
  #     floci:
  #       condition: service_healthy
  #   networks:
  #     - ghoststack-net

networks:
  ghoststack-net:
    driver: bridge

volumes:
  ghoststack-floci-data:
