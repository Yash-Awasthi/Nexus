# SPDX-License-Identifier: Apache-2.0
# Nexus Unified — local development stack
#
# Core services (always started):
#   postgres, redis, api, worker
#
# Optional profiles:
#   --profile ui          → React UI dev server (hot reload)
#   --profile observability → OTel collector
#   --profile finscrape   → fin-scrape ingest bridge
#
# Usage:
#   docker compose up                          # core stack
#   docker compose --profile ui up             # + UI dev server
#   docker compose up -d                       # detached

version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Nexus API ─────────────────────────────────────────────────────────────────
  # Fastify backend: gateway, council, memory, agents, research, +50 route groups
  # Also serves /api/* (Judica-compat bridge) for the unified UI frontend

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://nexus:nexus_dev_password@postgres:5432/nexus
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NEXUS_API_KEY: ${NEXUS_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      SEARXNG_BASE_URL: http://searxng:8080
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3001
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: nexus-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Nexus Worker ──────────────────────────────────────────────────────────────

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: nexus-worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://nexus:nexus_dev_password@postgres:5432/nexus
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEXUS_API_KEY: ${NEXUS_API_KEY}
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: nexus-worker
      SEARXNG_BASE_URL: http://searxng:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nexus UI (dev server) ─────────────────────────────────────────────────────
  # React Router 7 SPA with hot reload.
  # /api/* proxied to nexus-api via Vite proxy config.
  # Opt-in: docker compose --profile ui up

  ui:
    image: node:20.18.0-alpine
    container_name: nexus-ui
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "corepack enable && pnpm --filter @nexus/ui dev"
    ports:
      - "5173:5173"
    environment:
      NEXUS_API_URL: http://api:3001
    depends_on:
      - api
    profiles:
      - ui

  # ── Python ingest service ────────────────────────────────────────────────────

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    container_name: nexus-ingest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://nexus:nexus_dev_password@postgres:5432/nexus
      REDIS_URL: redis://redis:6379
      NEXUS_API_KEY: ${NEXUS_API_KEY}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── fin-scrape → Nexus ingest bridge ─────────────────────────────────────────
  # Opt-in: docker compose --profile finscrape up

  ingest-bridge:
    build:
      context: apps/ingest-py
      dockerfile: Dockerfile
    container_name: nexus-ingest-bridge
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      NEXUS_API_URL: http://api:3001
      NEXUS_INGEST_API_KEY: ${NEXUS_INGEST_API_KEY:-dev-api-key-change-in-prod}
      FINSCRAPE_OUTPUT_DIR: /data/finscrape
      FINSCRAPE_DONE_DIR: /data/finscrape/done
      BRIDGE_PORT: "8001"
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
      LOG_LEVEL: info
    volumes:
      - finscrape_data:/data/finscrape
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - finscrape

  # ── SearXNG self-hosted metasearch ────────────────────────────────────────────

  searxng:
    image: searxng/searxng:latest
    container_name: nexus-searxng
    restart: unless-stopped
    ports:
      - "4000:8080"
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-nexus-dev-searxng-secret-change-in-prod}
      SEARXNG_BASE_URL: http://searxng:8080
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Observability (optional) ──────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: nexus-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
      - "8888:8888"
    profiles:
      - observability

volumes:
  postgres_data:
  redis_data:
  searxng_data:
  finscrape_data:
